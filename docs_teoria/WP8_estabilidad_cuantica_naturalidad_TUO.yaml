wp: WP8
name: "Estabilidad cuántica y naturalidad de la TUO"
status: "frozen"
purpose: >
  Fijar el marco mínimo con el que debe evaluarse la estabilidad cuántica y la
  naturalidad de la TUO como EFT cosmológica, distinguiendo claramente entre
  estabilidad clásica, estabilidad radiativa y naturalidad fuerte.

working_hypotheses:
  H8_1:
    title: "La TUO actual es una EFT infrarroja"
    statement: >
      La formulación actual de la TUO se interpreta como una EFT válida por debajo
      de una escala de corte Lambda_EFT, sin pretender todavía una UV completion completa.
  H8_2:
    title: "Tres niveles de estabilidad"
    statement: >
      Deben distinguirse estabilidad clásica, estabilidad radiativa y naturalidad.
  H8_3:
    title: "Sin protección simétrica definitiva todavía"
    statement: >
      La TUO actual no dispone aún de una simetría UV cerrada que proteja todos sus parámetros.
  H8_4:
    title: "El problema de V0 sigue abierto"
    statement: >
      La pequeña escala del vacío efectivo se trata como problema abierto compartido con la
      mayoría de teorías del sector oscuro.

eft_frame:
  action: >
    S_EFT = integral sqrt(-g)[ M_Pl^2/2 R - 1/2 Z(phi)(partial phi)^2 - V(phi)
    + sum_i c_i O_i / Lambda_EFT^(Delta_i-4) ] + S_b[g] + S_r[g] + S_c[e^{2 beta(phi)} g]
  potential: "V(phi) = V0 + 1/2 nu^2 phi^2 + lambda4/4 phi^4"
  coupling: "beta(phi) = beta0 * phi / M_Pl"

radiative_estimates:
  delta_nu2: "delta nu^2 ~ (c_m / 16 pi^2) Lambda_EFT^2"
  delta_lambda4: "delta lambda4 ~ (c_lambda / 16 pi^2) lambda4^2 + ..."
  delta_V0: "delta V0 ~ (c_0 / 16 pi^2) Lambda_EFT^4"
  delta_beta0: "delta beta0 ~ (c_beta / 16 pi^2) beta0 log(Lambda_EFT / mu)"

acceptability_criteria:
  C1: "|delta nu^2| <= nu^2 or a protecting symmetry must be identified"
  C2: "Running of beta0 must not induce relevant baryonic couplings"
  C3: "Z_eff(phi) > 0 in the cosmological domain"
  C4: "Higher-dimensional operators remain subdominant for WP0-WP7 observables"

naturalness_policy:
  weak_naturalness: >
    Accepted if the EFT is stable and predictive in the cosmological window without
    immediate radiative destruction of the fitted parameter region.
  strong_naturalness: >
    Requires a symmetry or mechanism protecting nu^2, V0 and the dark coupling structure.
  current_status: "Not yet achieved in the present TUO"

candidate_symmetries:
  P8_1: "Approximate shift symmetry of phi"
  P8_2: "Scale / conformal symmetry in a deeper completion"
  P8_3: "Vacuum sequestering or dynamical adjustment mechanisms"

validation_requirements:
  V8_1: "Clear EFT window H0 << E << Lambda_EFT"
  V8_2: "Radiative corrections do not destroy the cosmologically viable region"
  V8_3: "No large visible-sector couplings regenerated by loops"
  V8_4: "Consistency with EFT cosmology frozen in WP0-WP7"

closes:
  - "Interpretation of the TUO as an EFT with finite validity range"
  - "Formal separation between radiative stability and strong naturalness"
  - "Recognition that V0 remains an open naturalness problem"

does_not_close:
  - "Full UV completion"
  - "Proof of renormalizability"
  - "Exact protection of V(phi) against loops"
  - "Solution to the cosmological constant problem"

official_statement: >
  The present TUO is a cosmological EFT that can be considered quantum-mechanically acceptable
  in a weak sense if a validity window exists where its parameters remain radiatively stable;
  however, strong naturalness of the tissue potential and effective vacuum energy remains open.

next_wp: "WP9 — firma exclusiva y falsabilidad de la TUO"
